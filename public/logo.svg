<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <!-- Main gradient: pink to yellow -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d78"/>
      <stop offset="50%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#ffe600"/>
    </linearGradient>

    <!-- Stroke gradient -->
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#aa0044"/>
      <stop offset="100%" style="stop-color:#aa8800"/>
    </linearGradient>

    <!-- Spray paint splatter filter -->
    <filter id="spray" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="4" dy="4" stdDeviation="2" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Background spray splatters -->
  <ellipse cx="60"  cy="100" rx="55" ry="40" fill="#ff2d78" opacity="0.08" filter="url(#spray)"/>
  <ellipse cx="300" cy="180" rx="80" ry="30" fill="#ffe600" opacity="0.06" filter="url(#spray)"/>
  <ellipse cx="540" cy="80"  rx="60" ry="45" fill="#aaff00" opacity="0.07" filter="url(#spray)"/>
  <ellipse cx="150" cy="30"  rx="40" ry="20" fill="#ff6600" opacity="0.09" filter="url(#spray)"/>
  <ellipse cx="480" cy="160" rx="50" ry="25" fill="#ff2d78" opacity="0.07" filter="url(#spray)"/>

  <!-- Small drip dots -->
  <circle cx="25"  cy="145" r="4" fill="#ff2d78" opacity="0.5"/>
  <circle cx="32"  cy="158" r="2" fill="#ff2d78" opacity="0.4"/>
  <circle cx="575" cy="55"  r="5" fill="#ffe600" opacity="0.5"/>
  <circle cx="568" cy="70"  r="2" fill="#ffe600" opacity="0.4"/>
  <circle cx="290" cy="190" r="3" fill="#aaff00" opacity="0.5"/>

  <!-- Drips on letters (thin vertical lines) -->
  <rect x="88"  y="130" width="3" height="22" rx="2" fill="#ff2d78" opacity="0.6"/>
  <rect x="220" y="125" width="2" height="18" rx="1" fill="#ff6600" opacity="0.5"/>
  <rect x="420" y="128" width="3" height="20" rx="2" fill="#ffe600" opacity="0.6"/>
  <rect x="510" y="122" width="2" height="25" rx="1" fill="#ff2d78" opacity="0.5"/>

  <!-- Black outline/shadow layer (offset) -->
  <text
    x="302" y="142"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="88"
    font-weight="900"
    font-style="italic"
    text-anchor="middle"
    fill="#000000"
    opacity="0.7"
    letter-spacing="-2"
  >ThatShitHard</text>

  <!-- Main text with gradient -->
  <text
    x="298" y="138"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="88"
    font-weight="900"
    font-style="italic"
    text-anchor="middle"
    fill="url(#mainGrad)"
    stroke="url(#strokeGrad)"
    stroke-width="1.5"
    filter="url(#glow)"
    letter-spacing="-2"
  >ThatShitHard</text>

  <!-- Highlight sheen on top third of text -->
  <text
    x="298" y="138"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="88"
    font-weight="900"
    font-style="italic"
    text-anchor="middle"
    fill="white"
    opacity="0.12"
    letter-spacing="-2"
  >ThatShitHard</text>

  <!-- Tagline -->
  <text
    x="298" y="170"
    font-family="'Courier New', monospace"
    font-size="13"
    font-weight="700"
    text-anchor="middle"
    fill="#ff2d78"
    letter-spacing="5"
    opacity="0.9"
  >[ SWIPE. RATE. DISCOVER. ]</text>

  <!-- Small star accents -->
  <text x="18"  y="105" font-size="18" fill="#ffe600" opacity="0.7">★</text>
  <text x="568" y="130" font-size="14" fill="#aaff00" opacity="0.7">★</text>
  <text x="280" y="20"  font-size="10" fill="#ff2d78" opacity="0.6">✦</text>
  <text x="320" y="18"  font-size="8"  fill="#ffe600" opacity="0.5">✦</text>
</svg>
